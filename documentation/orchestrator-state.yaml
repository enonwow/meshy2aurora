    severity: "P1"
    status: "RESOLVED_FOR_PROFILE_A"
    title: "MDX placement policy for initial direct-creature profile"
    detail: "Profile A emits one type-2002 MDL resource with an appended MDX block and no separate type-2003 entry. The local cep3_core1.hak has 3517 MDL entries and zero MDX entries; c_kocrachn size is exactly 12 + p_start_mdx + size_mdx."
