    severity: "P1"
    status: "OPEN"
    title: "Rust 1.96.1 toolchain unavailable"
    detail: "Rust 1.96.1, cargo, the wasm32-unknown-unknown target and wasm-pack 0.15.0 are required, but are not installed. MSVC 14.50 and Windows SDK 10.0.26100.0 are present."
    affects: ["M1A", "M1B", "M1C", "M2", "M3", "M4", "M5", "M6", "M7"]
    owner: "Mateusz + Codex"
    source: "documentation/decyzje-i-zadania-cloud.md D11/D12; local check 2026-07-10"
    next_action: "Install Rust 1.96.1 with rustfmt, clippy and wasm32-unknown-unknown plus wasm-pack 0.15.0, then record versions in M1A evidence."
  - id: "GB-004"
    severity: "P0"
    status: "OPEN"
    title: "2DA existing-table edit contract"
    detail: "The web app must derive and prove how it automatically edits an existing appearance.2da selected either directly or from a user-selected HAK, selects a safe row id and how the generated HAK resolves it."
    affects: ["M5", "M6", "M7"]
    owner: "Codex"
    source: "Aurora First plus NWN EE runtime proof"
    next_action: "Inspect Aurora table resolution and row-id constraints, then prove the selected edit path without committing retail data."
  - id: "GB-005"
    severity: "P0"
    status: "OPEN"
    title: "Full animation contract"
    detail: "Required animation names, events and the inherited-versus-emitted route must be confirmed per selected Aurora profile."
    affects: ["M4A", "M5", "M6", "M7"]
    owner: "Codex"
    source: "Aurora First animation anchors and NWN EE runtime proof"
    next_action: "Record the confirmed animation inventory, then implement and prove every required route."

