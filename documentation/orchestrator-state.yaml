    owner: "Codex"
    source: "documentation/engine-mdl-odpowiedz-codex.md Q2"
    next_action: "Implement the profile-A layout in M4, verify with own readback, then confirm in NWN EE during M6. Reopen only for a different model family with contrary Aurora First evidence."
