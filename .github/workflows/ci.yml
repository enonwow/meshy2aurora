name: ci

on:
  push:
  pull_request:

jobs:
  native-quality:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component rustfmt --component clippy
      - name: Format
        run: cargo +1.96.1 fmt --all --check
      - name: Clippy
        run: cargo +1.96.1 clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo +1.96.1 test --workspace

  wasm-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust and WASM target
        run: rustup toolchain install 1.96.1 --profile minimal --component rustfmt --component clippy --target wasm32-unknown-unknown
      - name: Install pinned wasm-pack
        run: cargo +1.96.1 install wasm-pack --version 0.15.0 --locked
      - name: Build WASM
        run: cargo +1.96.1 build -p m2a-wasm --target wasm32-unknown-unknown
      - name: Test public Node adapter
        run: wasm-pack test --node crates/m2a-wasm
      - name: Build generated Node package
        run: wasm-pack build crates/m2a-wasm --target nodejs --out-dir pkg
      - name: Test generated Node package boundary
        run: node crates/m2a-wasm/tests/node_boundary.cjs crates/m2a-wasm/pkg/m2a_wasm.js
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/studio-web/package-lock.json
      - name: Install Studio dependencies
        working-directory: apps/studio-web
        run: npm ci
      - name: Build static Studio with fresh web WASM
        working-directory: apps/studio-web
        run: npm run build
      - name: Test Studio
        working-directory: apps/studio-web
        run: npm test
      - name: Hygiene
        run: git diff --check
